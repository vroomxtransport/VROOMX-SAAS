[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # SECRETS_SCAN_OMIT_KEYS — non-secret env vars that the Netlify scanner
  # should ignore. The scanner reads env var VALUES from this build
  # environment + the Netlify dashboard, then greps the publish directory
  # for literal occurrences of those values. Anything found is failed.
  #
  # NEXT_PUBLIC_* keys are intentionally inlined by Next.js into the client
  # bundle (that's the whole point of the prefix), so they MUST be in the
  # omit list.
  #
  # SENTRY_* keys are passed to the Sentry build plugin which writes the
  # release/auth metadata into source maps; the auth token is short-lived
  # and scoped to project upload only.
  #
  # TEST_USER_EMAIL / TEST_USER_PASSWORD — non-secret e2e test fixtures.
  # PINNED to this list with explicit justification because removing them
  # has now broken main builds twice.
  #
  # CFG-011 (commit e8c3019, since reverted) tried to remove TEST_USER_EMAIL
  # from this list based on a source-tree grep that found zero references.
  # That grep was incomplete: the value lives in `.env.local` (gitignored,
  # so not visible to grep but bundled into the build) AND in the Netlify
  # dashboard env vars. Both inputs flow into the build and the literal
  # value ends up inside `.netlify/functions-internal/___netlify-server-handler/`
  # via Next.js env file resolution. The scanner finds it and fails.
  #
  # Before EVER removing a key from this list, you must:
  #   1. grep `.env.local` (NOT just src/) for the key
  #   2. confirm with the operator that the key is NOT set in the Netlify
  #      dashboard (Site → Environment variables)
  #   3. confirm the value does not appear hardcoded anywhere by greping
  #      for the actual value (not just the variable name)
  #   4. if all clear, also delete the key from `.env.local.example` and
  #      from the Netlify dashboard so it can never re-leak
  # See `.claude/rules/netlify-secrets-scanning.md` for the full procedure.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_SENTRY_DSN,NEXT_PUBLIC_POSTHOG_KEY,NEXT_PUBLIC_POSTHOG_HOST,SENTRY_ORG,SENTRY_PROJECT,SENTRY_AUTH_TOKEN,TEST_USER_EMAIL,TEST_USER_PASSWORD,NEXT_PUBLIC_VAPID_PUBLIC_KEY"

# CFG-009: deploy-preview safety is configured in the Netlify dashboard,
# NOT here. Env vars in netlify.toml are visible at build time and in
# the committed repo, so scoping Stripe / Resend / Supabase keys per
# context must be done via:
#   Netlify dashboard → Site → Environment variables → "Specific scopes"
# For each secret, set Production scope to the live value and
# Deploy Previews + Branch Deploys scope to a test/staging value. That
# way a PR preview can't hit production Stripe or send real emails.
# This is called out here so future operators know to check the dashboard.

# CFG-009: defensive security headers applied at the CDN edge. These
# duplicate what next.config.ts + middleware.ts already set for SSR
# responses, but static assets served directly by Netlify's CDN
# (under /_next/static/*, /images/*, /*.svg, etc.) are excluded from
# the Next.js middleware matcher and otherwise miss these headers.
# Defense-in-depth: Netlify applies [[headers]] BEFORE the request
# reaches Next.js, so every response — SSR or static — gets them.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    X-DNS-Prefetch-Control = "on"

# PostHog reverse proxy — Next.js rewrites don't proxy external URLs on Netlify edge
[[redirects]]
  from = "/ingest/static/*"
  to = "https://us-assets.i.posthog.com/static/:splat"
  status = 200

[[redirects]]
  from = "/ingest/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200

# Service worker must never be cached — browsers need the latest version on
# every navigation to detect SW updates. Cache-Control: max-age=0 forces a
# network revalidation on every load without blocking the page. The
# Service-Worker-Allowed header expands the SW scope to "/" so it can
# intercept all VroomX routes regardless of which subdirectory it is served
# from within the publish directory.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
