[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # CFG-011: TEST_USER_EMAIL was previously in this allow-list but the
  # actual e2e helper (e2e/helpers/auth.ts:8-9) reads E2E_TEST_EMAIL /
  # E2E_TEST_PASSWORD, NOT TEST_USER_*. The TEST_USER_* vars are dead
  # config. Removed from the omit list so the secret scanner is no
  # longer bypassing a key that the scanner would never see anyway.
  # Note to operators: if TEST_USER_EMAIL / TEST_USER_PASSWORD are set
  # in your local .env.local or Netlify dashboard, they can be deleted.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_SENTRY_DSN,NEXT_PUBLIC_POSTHOG_KEY,NEXT_PUBLIC_POSTHOG_HOST,SENTRY_ORG,SENTRY_PROJECT,SENTRY_AUTH_TOKEN"

# CFG-009: deploy-preview safety is configured in the Netlify dashboard,
# NOT here. Env vars in netlify.toml are visible at build time and in
# the committed repo, so scoping Stripe / Resend / Supabase keys per
# context must be done via:
#   Netlify dashboard → Site → Environment variables → "Specific scopes"
# For each secret, set Production scope to the live value and
# Deploy Previews + Branch Deploys scope to a test/staging value. That
# way a PR preview can't hit production Stripe or send real emails.
# This is called out here so future operators know to check the dashboard.

# CFG-009: defensive security headers applied at the CDN edge. These
# duplicate what next.config.ts + middleware.ts already set for SSR
# responses, but static assets served directly by Netlify's CDN
# (under /_next/static/*, /images/*, /*.svg, etc.) are excluded from
# the Next.js middleware matcher and otherwise miss these headers.
# Defense-in-depth: Netlify applies [[headers]] BEFORE the request
# reaches Next.js, so every response — SSR or static — gets them.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    X-DNS-Prefetch-Control = "on"

# PostHog reverse proxy — Next.js rewrites don't proxy external URLs on Netlify edge
[[redirects]]
  from = "/ingest/static/*"
  to = "https://us-assets.i.posthog.com/static/:splat"
  status = 200

[[redirects]]
  from = "/ingest/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200
