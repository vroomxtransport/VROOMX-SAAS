<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VroomX TMS – PDF Import</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 360px;
        min-height: 180px;
        background: #0f172a;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      .popup { padding: 16px; }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 14px;
        border-bottom: 1px solid #1e293b;
      }

      .logo {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; flex-shrink: 0;
      }

      .title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
      .subtitle { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }

      /* ── Hero Import Section ── */
      .import-hero {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        margin-bottom: 14px;
      }

      .import-hero.no-pdf {
        border-style: dashed;
      }

      .import-icon { font-size: 32px; margin-bottom: 8px; }

      .import-title {
        font-size: 14px; font-weight: 600; color: #f1f5f9;
        margin-bottom: 4px;
      }

      .import-desc {
        font-size: 12px; color: #64748b;
        margin-bottom: 14px;
      }

      .btn-import {
        display: block; width: 100%;
        padding: 12px 16px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #fff; border: none; border-radius: 8px;
        font-size: 14px; font-weight: 700; font-family: inherit;
        cursor: pointer;
        box-shadow: 0 2px 10px rgba(34, 197, 94, 0.3);
        transition: all 0.15s ease;
      }

      .btn-import:hover:not(:disabled) {
        background: linear-gradient(135deg, #16a34a, #15803d);
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(34, 197, 94, 0.4);
      }

      .btn-import:disabled {
        opacity: 0.7; cursor: not-allowed; transform: none;
      }

      .import-status {
        font-size: 12px; margin-top: 10px;
        display: none;
      }

      .import-status.error { color: #ef4444; }
      .import-status.success { color: #22c55e; }
      .import-status.loading { color: #f59e0b; }

      /* ── Status Section ── */
      .status-section {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 14px;
      }

      .status-row { display: flex; align-items: center; gap: 10px; }

      .status-dot {
        width: 8px; height: 8px;
        border-radius: 50%; flex-shrink: 0;
      }
      .status-dot.connected { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
      .status-dot.disconnected { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.2); }
      .status-dot.loading { background: #f59e0b; animation: pulse 1.2s ease-in-out infinite; }

      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

      .status-label { font-size: 12px; color: #94a3b8; flex: 1; }
      .status-label strong { color: #f1f5f9; font-weight: 600; }

      .import-count { font-size: 11px; color: #64748b; margin-top: 6px; }
      .import-count strong { color: #22c55e; }

      /* ── Connect ── */
      .connect-btn {
        display: block; width: 100%;
        padding: 8px 14px;
        background: transparent; color: #22c55e;
        border: 1px solid #22c55e; border-radius: 8px;
        font-size: 12px; font-weight: 600; font-family: inherit;
        cursor: pointer; text-decoration: none; text-align: center;
        margin-bottom: 14px;
      }
      .connect-btn:hover { background: rgba(34,197,94,0.1); }

      /* ── Settings ── */
      .settings-toggle {
        background: none; border: none; padding: 0;
        color: #475569; font-size: 11px; font-family: inherit;
        cursor: pointer; display: flex; align-items: center; gap: 4px;
      }
      .settings-toggle:hover { color: #64748b; }
      .chevron { font-size: 9px; transition: transform 0.2s; display: inline-block; }
      .settings-toggle.open .chevron { transform: rotate(180deg); }

      .settings-panel {
        display: none;
        background: #1e293b; border: 1px solid #334155;
        border-radius: 8px; padding: 10px 12px; margin-top: 8px;
      }
      .settings-panel.visible { display: block; }

      .settings-label {
        display: block; font-size: 10px; font-weight: 600;
        color: #475569; text-transform: uppercase; letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .input-row { display: flex; gap: 6px; }

      .settings-input {
        flex: 1; min-width: 0;
        background: #0f172a; border: 1px solid #334155; border-radius: 6px;
        color: #e2e8f0; font-size: 12px; font-family: inherit;
        padding: 6px 8px; outline: none;
      }
      .settings-input:focus { border-color: #22c55e; }

      .save-btn {
        background: #334155; border: 1px solid #475569; border-radius: 6px;
        color: #e2e8f0; font-size: 11px; font-weight: 600; font-family: inherit;
        padding: 6px 10px; cursor: pointer; white-space: nowrap;
      }
      .save-btn:hover { background: #475569; }
      .save-btn.saved { background: #166534; border-color: #16a34a; color: #bbf7d0; }

      /* ── Footer ── */
      .footer {
        margin-top: 14px; padding-top: 10px;
        border-top: 1px solid #1e293b;
        display: flex; align-items: center; justify-content: space-between;
      }
      .footer-text { font-size: 10px; color: #334155; }
      .footer-link {
        font-size: 10px; color: #475569; background: none; border: none;
        font-family: inherit; cursor: pointer; padding: 0;
      }
      .footer-link:hover { color: #64748b; }
    </style>
  </head>
  <body>
    <div class="popup">
      <!-- Header -->
      <div class="header">
        <div class="logo">&#x26A1;</div>
        <div>
          <div class="title">VroomX TMS</div>
          <div class="subtitle">PDF Import</div>
        </div>
      </div>

      <!-- Hero Import Section -->
      <div class="import-hero no-pdf" id="import-hero">
        <div class="import-icon" id="import-icon">&#x1F4C4;</div>
        <div class="import-title" id="import-title">Open a dispatch sheet PDF</div>
        <div class="import-desc" id="import-desc">Open any dispatch PDF in Chrome, then click here to import.</div>
        <button class="btn-import" id="import-btn" disabled>Import to VroomX</button>
        <div class="import-status" id="import-status"></div>
      </div>

      <!-- Status -->
      <div class="status-section">
        <div class="status-row">
          <div class="status-dot loading" id="status-dot"></div>
          <div class="status-label">
            <strong id="status-title">Checking...</strong>
            <span id="status-subtitle"></span>
          </div>
        </div>
        <div class="import-count" id="import-count-row" style="display:none">
          Total imported: <strong id="import-count">0</strong> orders
        </div>
      </div>

      <!-- Connect (when not authenticated) -->
      <a class="connect-btn" id="connect-btn" href="#" target="_blank" style="display:none">
        Sign in to VroomX TMS
      </a>

      <!-- Settings -->
      <div>
        <button class="settings-toggle" id="settings-toggle">
          <span class="chevron">&#x25B2;</span> Settings
        </button>
        <div class="settings-panel" id="settings-panel">
          <label class="settings-label" for="vroomx-url">VroomX URL</label>
          <div class="input-row">
            <input type="url" id="vroomx-url" class="settings-input" placeholder="http://localhost:3000" spellcheck="false" />
            <button class="save-btn" id="save-btn">Save</button>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <span class="footer-text">v1.0.0</span>
        <button class="footer-link" id="disconnect-btn" style="display:none">Sign out</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
